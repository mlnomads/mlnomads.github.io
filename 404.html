<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#161533" />
  <title>404 - Page Not Found | MLNomads</title>
  <link rel="icon" type="image/x-icon" href="./imgs/favicon.ico" />
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--desert-night);
      padding: 2rem;
      padding-top: 80px;
    }

    .error-code {
      font-size: clamp(5rem, 15vw, 10rem);
      font-family: var(--font-display);
      color: rgba(var(--terracotta-rgb), 0.15);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 1rem;
    }

    .error-message {
      font-size: 1.5rem;
      color: white;
      margin-bottom: 0.5rem;
      font-family: var(--font-display);
    }

    .error-desc {
      color: rgba(255, 255, 255, 0.6);
      font-size: 1rem;
      margin-bottom: 2rem;
      max-width: 400px;
    }

    .error-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--terracotta);
      color: var(--desert-night);
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease;
    }

    .error-home:hover {
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar" id="navbar" role="navigation" aria-label="Main navigation">
    <div class="nav-links-left">
      <a href="/#about">About</a>
      <a href="/#events">Events</a>
      <a href="https://blog.mlnomads.com/" target="_blank" rel="noopener">Blog</a>
    </div>

    <a href="/" id="home-link" aria-label="MLNomads Home">
      <img src="imgs/mlnomads-logo.svg" alt="MLNomads Logo" class="nav-logo" />
    </a>

    <div class="nav-links-right">
      <a href="/#faq">FAQ</a>
      <a href="https://github.com/mlnomads" target="_blank" rel="noopener">GitHub</a>
      <a href="https://www.mlnomads.com/discord" class="nav-discord-btn" target="_blank" rel="noopener">
        <i class="fab fa-discord" aria-hidden="true"></i> Discord
      </a>
    </div>

    <button class="hamburger" id="hamburger" aria-label="Toggle navigation menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <div class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-message">Lost in the Desert</h1>
    <p class="error-desc">The caravan moved on. This page isn't where you expected.</p>
    <a href="/" class="error-home"><i class="fas fa-arrow-left" aria-hidden="true"></i> Back to camp</a>
  </div>

  <script src="js/menu.js" defer></script>
</body>

</html>
