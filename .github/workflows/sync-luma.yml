name: Sync Luma events

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/sync_luma.py"
      - ".github/workflows/sync-luma.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run sync script
        run: python3 scripts/sync_luma.py

      - name: Commit if changed
        run: |
          if git diff --quiet data/events.json; then
            echo "No event changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          git commit -m "chore(events): sync from Luma"
          git push
